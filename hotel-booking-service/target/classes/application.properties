spring.application.name=hotel-booking-service

# Railway gives a dynamic PORT; default to 8080 locally
server.port=${PORT:8080}
server.address=0.0.0.0

# H2 in-memory database (each service has its own DB; users are looked up via JWT, not DB)
spring.datasource.url=jdbc:h2:mem:hotel_booking_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

# JWT — MUST be identical to the auth-service value
jwt.secret=${JWT_SECRET:ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODc4NTAzZjRlZGIxNDQyMTllMDIxMzVjNzg2NWM3MA==}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
