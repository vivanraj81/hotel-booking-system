spring.application.name=hotel-booking-service
server.port=8082

# Database (shared with auth service)
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=hoteluser
spring.datasource.password=hotelpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT - same secret as auth service
jwt.secret=ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODc4NTAzZjRlZGIxNDQyMTllMDIxMzVjNzg2NWM3MA==

# CORS
cors.allowed-origins=http://localhost:4200

logging.level.org.springframework.security=INFO
