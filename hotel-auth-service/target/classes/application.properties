spring.application.name=hotel-auth-service
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=hoteluser
spring.datasource.password=hotelpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT - shared secret across services
jwt.secret=ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODc4NTAzZjRlZGIxNDQyMTllMDIxMzVjNzg2NWM3MA==
jwt.expiration-ms=86400000

# CORS
cors.allowed-origins=http://localhost:4200

# Logging
logging.level.org.springframework.security=INFO
