spring.application.name=hotel-auth-service

# Railway gives a dynamic PORT; default to 8080 locally
server.port=${PORT:8080}
server.address=0.0.0.0

# H2 in-memory database (production-safe for stateless deploys)
spring.datasource.url=jdbc:h2:mem:hotel_auth_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console disabled in production
spring.h2.console.enabled=false

# JWT — both services MUST share the same secret (set via env var on Railway)
jwt.secret=${JWT_SECRET:ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODc4NTAzZjRlZGIxNDQyMTllMDIxMzVjNzg2NWM3MA==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — set CORS_ALLOWED_ORIGINS on Railway to your Angular URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://hotel-booking-system-5qmgk9f0a-vivan-rajs-projects.vercel.app}

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
